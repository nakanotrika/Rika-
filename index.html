<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小学生理科クイズ</title>

<style>

body{
font-family:sans-serif;
background:#eef4ff;
margin:0;
padding:10px;
text-align:center;
}

h1{
background:#4a90e2;
color:white;
padding:12px;
border-radius:8px;
}

select,button{
font-size:18px;
padding:10px;
margin:8px;
border-radius:8px;
}

.question{
background:white;
margin:15px auto;
padding:15px;
max-width:700px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.choice{
display:block;
padding:10px;
margin:6px;
border-radius:8px;
background:#f3f6ff;
font-size:18px;
}

.choice:hover{
background:#dfe7ff;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h1>小学生 理科クイズ</h1>

<div>

学年  
<select id="grade"></select>

単元  
<select id="unit"></select>

<button onclick="startQuiz()">クイズ開始</button>

</div>

<div id="scoreBox"></div>
<div id="quiz"></div>

<script>

/* =========================
問題データ
========================= */

const quizData={

"3":{
"生き物をさがそう":[
{q:"昆虫の足はどこから出ているかな？",a:["むね","あたま","はら"],c:0,e:"昆虫の足はむねから6本出ています。"},
{q:"ひまわりの種をまくのにぴったりの季節は？",a:["春","夏","冬"],c:0,e:"春にまきます。"},
{q:"虫めがねで太陽を見てもいい？",a:["絶対だめ","少しならいい","サングラスならいい"],c:0,e:"目を痛めるので見てはいけません。"},
{q:"タンポポの根っこはどうなっている？",a:["1本の太い根","たくさんの細い根","根はない"],c:0,e:"太い根が1本あります。"},
{q:"モンシロチョウの幼虫が好きな食べ物は？",a:["キャベツ","ひまわり","サクラ"],c:0,e:"キャベツを食べます。"}
],

"チョウを育てよう":[
{q:"モンシロチョウのたまごの形は？",a:["ラグビーボール形","まんまる","しかく"],c:0,e:"ラグビーボールのような形です。"},
{q:"アオムシは何回皮をぬぐ？",a:["4回","1回","しない"],c:0,e:"4回ぬぎます。"},
{q:"さなぎからチョウが出ることを？",a:["羽化","ふか","脱皮"],c:0,e:"羽化といいます。"},
{q:"昆虫の体は？",a:["頭むねはら","頭体足","頭腹"],c:0,e:"頭むねはらです。"},
{q:"チョウの足の本数は？",a:["6本","4本","8本"],c:0,e:"昆虫は6本です。"}
],

"太陽の動き":[
{q:"太陽はどこからのぼる？",a:["東","西","南"],c:0,e:"東からのぼります。"},
{q:"太陽はどこにしずむ？",a:["西","東","北"],c:0,e:"西にしずみます。"},
{q:"昼の太陽の位置は？",a:["南","北","東"],c:0,e:"南にあります。"},
{q:"影は太陽のどちら側？",a:["反対","同じ","関係ない"],c:0,e:"反対にできます。"},
{q:"影が一番短いのは？",a:["昼","朝","夕"],c:0,e:"昼です。"}
]

},

/* =========================
４年
========================= */

"4":{

"天気と気温":[
{q:"気温はどこではかる？",a:["日かげ","日なた","地面"],c:0,e:"日かげです。"},
{q:"晴れの日の気温は？",a:["昼高い","夜高い","変わらない"],c:0,e:"昼に高くなります。"},
{q:"雲が多い天気は？",a:["くもり","晴れ","快晴"],c:0,e:"くもりです。"},
{q:"気温差が大きい天気は？",a:["晴れ","くもり","雨"],c:0,e:"晴れです。"},
{q:"雨の日の気温変化は？",a:["少ない","多い","同じ"],c:0,e:"少ないです。"}
]

},

/* =========================
５年
========================= */

"5":{

"植物の発芽":[
{q:"発芽に必要なものは？",a:["水空気適温","光","肥料"],c:0,e:"水空気適温です。"},
{q:"発芽に光は？",a:["いらない","いる","どちらでも"],c:0,e:"必要ありません。"},
{q:"養分の場所は？",a:["子葉","根","くき"],c:0,e:"子葉です。"},
{q:"子葉はその後？",a:["しぼむ","大きくなる","花"],c:0,e:"しぼみます。"},
{q:"適温は？",a:["20〜25","0","100"],c:0,e:"20〜25度。"}
]

},

/* =========================
６年
========================= */

"6":{

"ものの燃え方":[
{q:"燃えるのを助ける気体は？",a:["酸素","窒素","二酸化炭素"],c:0,e:"酸素です。"},
{q:"空気の多くは？",a:["窒素","酸素","二酸化炭素"],c:0,e:"窒素です。"},
{q:"燃えた後増える気体？",a:["二酸化炭素","酸素","窒素"],c:0,e:"二酸化炭素です。"},
{q:"石灰水は？",a:["白く濁る","赤く","透明"],c:0,e:"白く濁ります。"},
{q:"燃え続ける条件？",a:["新しい空気","密閉","水"],c:0,e:"新しい空気です。"}
]

}

}

/* =========================
UI
========================= */

const gradeSelect=document.getElementById("grade")
const unitSelect=document.getElementById("unit")

for(let g in quizData){

let op=document.createElement("option")
op.value=g
op.textContent=g+"年生"
gradeSelect.appendChild(op)

}

gradeSelect.onchange=function(){

unitSelect.innerHTML=""

let units=quizData[this.value]

for(let u in units){

let op=document.createElement("option")
op.value=u
op.textContent=u
unitSelect.appendChild(op)

}

}

gradeSelect.dispatchEvent(new Event("change"))

/* =========================
クイズ
========================= */

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

let current=[]

function startQuiz(){

let grade=gradeSelect.value
let unit=unitSelect.value

let questions=[...quizData[grade][unit]]

shuffle(questions)

current=questions.slice(0,5)

let html=""

current.forEach((q,i)=>{

html+=`<div class="question">

<p><b>Q${i+1}</b> ${q.q}</p>`

q.a.forEach((c,index)=>{

html+=`
<label class="choice">
<input type="radio" name="q${i}" value="${index}">
${c}
</label>
`

})

html+=`<div id="r${i}"></div></div>`

})

html+=`<button onclick="check()">答え合わせ</button>`

quiz.innerHTML=html

}

function check(){

let score=0

current.forEach((q,i)=>{

let checked=document.querySelector(`input[name="q${i}"]:checked`)
let r=document.getElementById("r"+i)

if(!checked){
r.innerHTML="未回答"
return
}

if(Number(checked.value)==q.c){

score++
r.innerHTML=`<p class="correct">正解</p><p>${q.e}</p>`

}else{

r.innerHTML=`<p class="wrong">不正解</p><p>${q.e}</p>`

}

})

alert("得点 "+score+" / "+current.length)

}

</script>

</body>
</html>
