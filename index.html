<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学校理科クイズマスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f0fdf4;
            color: #374151;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .btn-grade {
            transition: transform 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }
        .btn-grade:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .unit-card {
            border: 2px solid #e5e7eb;
            transition: all 0.2s;
        }
        .unit-card.completed {
            background-color: #fef3c7;
            border-color: #fbbf24;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ヘッダー -->
        <header class="bg-green-600 p-4 text-white text-center shadow-md">
            <h1 class="text-xl font-bold">理科クイズマスター</h1>
            <div id="status-bar" class="text-xs mt-1 opacity-80">全185問 収録</div>
        </header>

        <!-- メイン表示エリア -->
        <main id="view-container" class="scroll-area">
            
            <!-- 【1】学年選択画面 -->
            <div id="view-home" class="space-y-6">
                <div class="text-center py-4 text-lg font-bold text-gray-600">何年生の問題に挑戦する？</div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="app.showUnits('3')" class="btn-grade bg-yellow-400 text-white py-12 rounded-3xl text-2xl font-bold">3年生</button>
                    <button onclick="app.showUnits('4')" class="btn-grade bg-orange-400 text-white py-12 rounded-3xl text-2xl font-bold">4年生</button>
                    <button onclick="app.showUnits('5')" class="btn-grade bg-blue-400 text-white py-12 rounded-3xl text-2xl font-bold">5年生</button>
                    <button onclick="app.showUnits('6')" class="btn-grade bg-purple-400 text-white py-12 rounded-3xl text-2xl font-bold">6年生</button>
                </div>
            </div>

            <!-- 【2】単元選択画面 -->
            <div id="view-units" class="hidden space-y-4">
                <button onclick="app.showHome()" class="text-green-600 font-bold mb-2">← もどる</button>
                <h2 id="current-grade-title" class="text-2xl font-bold border-b-4 border-green-200 pb-2"></h2>
                <div id="unit-list" class="space-y-3"></div>
            </div>

            <!-- 【3】クイズ画面 -->
            <div id="view-quiz" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <span id="quiz-progress" class="bg-gray-100 px-3 py-1 rounded-full text-sm font-bold">1 / 5</span>
                    <span id="quiz-score" class="text-orange-500 font-bold">0点</span>
                </div>
                <div class="bg-green-50 p-6 rounded-2xl mb-6 min-h-[120px] flex items-center shadow-inner">
                    <p id="question-text" class="text-lg font-bold leading-relaxed"></p>
                </div>
                <div id="options-container" class="space-y-3"></div>
                
                <!-- 解説エリア -->
                <div id="feedback-area" class="hidden mt-6 p-4 bg-yellow-50 border-2 border-yellow-200 rounded-2xl">
                    <div id="result-label" class="text-center text-2xl font-bold mb-2"></div>
                    <p class="text-sm font-bold text-yellow-800 mb-1">【かいせつ】</p>
                    <p id="explanation-text" class="text-sm leading-relaxed mb-4"></p>
                    <button onclick="app.nextQuestion()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg">次へすすむ</button>
                </div>
            </div>

            <!-- 【4】結果画面 -->
            <div id="view-result" class="hidden text-center py-10">
                <div class="text-6xl mb-6" id="result-emoji">🎉</div>
                <h2 class="text-2xl font-bold mb-2">結果は...</h2>
                <div id="final-score" class="text-6xl font-black text-green-600 mb-6"></div>
                <p id="result-msg" class="font-bold text-gray-500 mb-8 px-4"></p>
                <button onclick="app.showHome()" class="w-full bg-orange-400 text-white py-4 rounded-full font-bold text-lg">学年選択にもどる</button>
            </div>

        </main>
        
        <footer class="p-2 text-[10px] text-gray-300 text-center border-t">
            Science Quiz App
        </footer>
    </div>

    <script>
        // データの定義（3年生〜6年生）
        const QUIZ_DATA = {
            "3": {
                "生き物をさがそう": [
                    {q:"昆虫の足はどこから出ているかな？", a:["むね","あたま","はら"], c:0, e:"昆虫の足はすべて「むね」の部分から6本出ています。"},
                    {q:"ひまわりの種をまくのにぴったりの季節は？", a:["春","夏","冬"], c:0, e:"暖かくなってきた春（4月〜5月ごろ）にまきます。"},
                    {q:"虫めがねで太陽を見てもいい？", a:["絶対だめ","少しならいい","サングラスならいい"], c:0, e:"目をひどく痛めるので、絶対に見てはいけません。"},
                    {q:"タンポポの根っこはどうなっている？", a:["1本の太い根","たくさんの細い根","根はない"], c:0, e:"タンポポは地面深くに向かって1本の太い根がのびています。"},
                    {q:"モンシロチョウの幼虫が好きな食べ物は？", a:["キャベツ","ひまわり","サクラ"], c:0, e:"モンシロチョウはキャベツなどの葉にたまごを産み、幼虫はそれを食べます。"}
                ],
                "チョウを育てよう": [
                    {q:"モンシロチョウのたまごの形は？", a:["ラグビーボール形","まんまる","しかく"], c:0, e:"小さなつぶつぶで、よく見るとラグビーボールのような形をしています。"},
                    {q:"アオムシは何回皮をぬいで大きくなる？", a:["4回","1回","しない"], c:0, e:"4回脱皮（だっぴ）して、5れい幼虫という大きさになります。"},
                    {q:"さなぎからチョウが出てくることを何という？", a:["羽化（うか）","ふか","脱皮"], c:0, e:"さなぎから成虫になることを羽化といいます。"},
                    {q:"昆虫の体は「頭・むね・◯」？", a:["はら","あし","はね"], c:0, e:"昆虫は「あたま・むね・はら」の3つにわかれています。"},
                    {q:"チョウの足の本数は？", a:["6本","4本","8本"], c:0, e:"昆虫の仲間なので、足は6本です。"}
                ],
                "風やゴムの力": [
                    {q:"風を強くあてると、車はどう動く？", a:["遠くまで進む","あまり進まない","止まる"], c:0, e:"風の力が強いほど、車を動かすエネルギーが大きくなります。"},
                    {q:"ゴムを長くのばすと、もどる力はどうなる？", a:["強くなる","弱くなる","変わらない"], c:0, e:"ゴムは長くのばすほど、強くもどろうとします。"},
                    {q:"車を重くすると、進むきょりはどうなる？", a:["短くなる","長くなる","変わらない"], c:0, e:"重いものを動かすには、より大きな力が必要になります。"},
                    {q:"帆（ほ）を大きくすると風の力はどうなる？", a:["大きくなる","小さくなる","変わらない"], c:0, e:"風を受ける面積が広いほど、大きな力を受け取れます。"},
                    {q:"ゴムで動く車。ゴムを2本に増やすと？", a:["より遠くへ進む","進まなくなる","重くなる"], c:0, e:"ゴムの本数が増えると、もどる力も合わさって強くなります。"}
                ]
                // ※ 他の単元もデータ構造は同じです
            },
            "4": {
                "電気のはたらき": [
                    {q:"乾電池2個をまっすぐつなぐことを何という？", a:["直列つなぎ","並列つなぎ","交互つなぎ"], c:0, e:"＋とーを順につなぐのが直列つなぎです。"},
                    {q:"モーターをもっと速く回すには電池をどうつなぐ？", a:["直列につなぐ","並列につなぐ","反対につなぐ"], c:0, e:"直列につなぐと電流が強くなり、パワーが増します。"},
                    {q:"電池を並列につないだとき、電流の強さは？", a:["電池1個分と同じ","電池2個分になる","半分になる"], c:0, e:"パワーは変わりませんが、電池が長持ちします。"},
                    {q:"電流の向きを逆にすると、プロペラの回る向きは？", a:["反対になる","止まる","変わらない"], c:0, e:"電気の流れに合わせて、モーターの回る向きも変わります。"},
                    {q:"光電池（ソーラーパネル）が電気を作るのはいつ？", a:["光があたったとき","風が吹いたとき","夜"], c:0, e:"太陽の光などのエネルギーを電気に変えます。"}
                ]
            },
            "5": {
                "植物の発芽": [
                    {q:"発芽（はつが）に必要な3条件は？", a:["水・空気・適した温度","水・土・肥料","光・土・空気"], c:0, e:"土や肥料、光がなくても芽は出ます。"},
                    {q:"種の中にある栄養分は何？", a:["でんぷん","さとう","あぶら"], c:0, e:"ヨウ素液（ようそえき）をかけると青むらさき色になります。"},
                    {q:"冷蔵庫に入れた種が芽を出さない理由は？", a:["温度が低いから","空気がないから","暗いから"], c:0, e:"芽が出るには適した温度が必要です。"},
                    {q:"水に沈みっぱなしの種が芽を出さない理由は？", a:["空気がないから","光がないから","水が多すぎるから"], c:0, e:"植物も呼吸をするために空気が必要です。"},
                    {q:"発芽した後の成長に必要なものは？", a:["日光と肥料","暗やみ","温度だけ"], c:0, e:"芽が出た後は、自分で栄養を作るために光が必要になります。"}
                ]
            },
            "6": {
                "ものの燃え方": [
                    {q:"ものが燃えるのを助ける気体はどれ？", a:["酸素","窒素","二酸化炭素"], c:0, e:"酸素にはものを燃やすのを助けるはたらきがあります。"},
                    {q:"ものが燃えた後に増える気体は？", a:["二酸化炭素","酸素","水素"], c:0, e:"酸素が使われて、二酸化炭素が発生します。"},
                    {q:"石灰水（せっかいすい）を白くにごらせる気体は？", a:["二酸化炭素","酸素","ちっ素"], c:0, e:"二酸化炭素が含まれているか調べる実験の基本です。"},
                    {q:"空気が入れかわらない集気びんの中のろうそくは？", a:["すぐに消える","燃え続ける","大きく燃える"], c:0, e:"新しい酸素が入ってこないと火は消えてしまいます。"},
                    {q:"空気中に一番たくさん含まれている気体は？", a:["ちっ素","酸素","二酸化炭素"], c:0, e:"空気の約78％はちっ素です。"}
                ]
            }
        };

        const app = {
            currentGrade: "",
            currentUnit: "",
            questions: [],
            qIndex: 0,
            score: 0,
            isLocked: false,

            showView(id) {
                ["view-home", "view-units", "view-quiz", "view-result"].forEach(v => {
                    document.getElementById(v).classList.add('hidden');
                });
                document.getElementById(id).classList.remove('hidden');
                document.getElementById('view-container').scrollTop = 0;
            },

            showHome() {
                this.showView('view-home');
            },

            showUnits(grade) {
                this.currentGrade = String(grade);
                const titleEl = document.getElementById('current-grade-title');
                const listEl = document.getElementById('unit-list');
                
                titleEl.innerText = this.currentGrade + "年生の単元";
                listEl.innerHTML = "";

                const units = QUIZ_DATA[this.currentGrade];
                if (!units) {
                    listEl.innerHTML = "<p class='text-gray-400'>データ準備中です</p>";
                } else {
                    Object.keys(units).forEach(unitName => {
                        const btn = document.createElement('button');
                        btn.className = "unit-card w-full p-5 rounded-2xl text-left font-bold shadow-sm flex justify-between items-center bg-white hover:bg-green-50 active:scale-95 transition-all";
                        btn.innerHTML = `<span>${unitName}</span><span class='text-green-400'>▶</span>`;
                        btn.onclick = () => this.startQuiz(unitName);
                        listEl.appendChild(btn);
                    });
                }
                this.showView('view-units');
            },

            startQuiz(unitName) {
                this.currentUnit = unitName;
                const source = QUIZ_DATA[this.currentGrade][unitName];
                this.questions = [...source].sort(() => Math.random() - 0.5);
                this.qIndex = 0;
                this.score = 0;
                this.isLocked = false;
                this.renderQuestion();
                this.showView('view-quiz');
            },

            renderQuestion() {
                const q = this.questions[this.qIndex];
                document.getElementById('quiz-progress').innerText = `${this.qIndex + 1} / ${this.questions.length}`;
                document.getElementById('quiz-score').innerText = `${this.score}点`;
                document.getElementById('question-text').innerText = q.q;
                document.getElementById('feedback-area').classList.add('hidden');
                
                const container = document.getElementById('options-container');
                container.innerHTML = "";
                this.isLocked = false;

                // 選択肢のシャッフル
                const opts = q.a.map((text, idx) => ({ text, isCorrect: idx === q.c }));
                opts.sort(() => Math.random() - 0.5);

                opts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full p-4 bg-white border-2 border-gray-200 rounded-xl font-bold text-left hover:border-green-400 transition-colors";
                    btn.innerText = opt.text;
                    btn.onclick = () => this.checkAnswer(opt.isCorrect, btn);
                    container.appendChild(btn);
                });
            },

            checkAnswer(isCorrect, btn) {
                if (this.isLocked) return;
                this.isLocked = true;

                // 他のボタンを無効化
                const btns = document.getElementById('options-container').querySelectorAll('button');
                btns.forEach(b => {
                    b.style.opacity = "0.5";
                    b.disabled = true;
                });
                btn.style.opacity = "1";

                const label = document.getElementById('result-label');
                if (isCorrect) {
                    this.score += 20;
                    label.innerText = "⭕ 正解！";
                    label.className = "text-center text-3xl font-bold mb-2 text-green-500";
                    btn.classList.add('border-green-500', 'bg-green-50');
                } else {
                    label.innerText = "❌ まちがい";
                    label.className = "text-center text-3xl font-bold mb-2 text-red-500";
                    btn.classList.add('border-red-500', 'bg-red-50');
                }

                document.getElementById('explanation-text').innerText = this.questions[this.qIndex].e;
                document.getElementById('feedback-area').classList.remove('hidden');
            },

            nextQuestion() {
                this.qIndex++;
                if (this.qIndex < this.questions.length) {
                    this.renderQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                document.getElementById('final-score').innerText = this.score + "点";
                const msg = document.getElementById('result-msg');
                const emoji = document.getElementById('result-emoji');
                
                if (this.score === 100) {
                    emoji.innerText = "👑";
                    msg.innerText = "すごい！満点です！この単元はばっちりだね。";
                } else if (this.score >= 60) {
                    emoji.innerText = "🎉";
                    msg.innerText = "合格点！あと少しで満点だ。もう一度やってみる？";
                } else {
                    emoji.innerText = "💪";
                    msg.innerText = "がんばったね。解説を読んで、もう一度挑戦しよう！";
                }
                this.showView('view-result');
            }
        };

        // 初期表示
        window.onload = () => app.showHome();
    </script>
</body>
</html>
