<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学校理科クイズマスター | 3年生〜6年生 全185問</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f0fdf4;
            color: #374151;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* カスタムスクロールバー */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 10px; }

        .app-card {
            border: 6px solid #4ade80;
            background: white;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .btn-push {
            transition: all 0.15s;
            box-shadow: 0 4px 0 #cbd5e1;
            position: relative;
        }
        .btn-push:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        ruby rt {
            font-size: 0.6em;
            color: #6b7280;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen bg-green-50 p-2 sm:p-6">

    <!-- メインコンテナ -->
    <div id="app" class="w-full max-w-2xl app-card rounded-[2.5rem] overflow-hidden flex flex-col h-[92vh] max-h-[850px]">
        
        <!-- ヘッダー -->
        <header class="bg-green-500 p-5 text-white text-center shrink-0 shadow-lg z-10">
            <h1 class="text-xl sm:text-2xl font-bold tracking-tight">
                <ruby>理科<rt>りか</rt></ruby>クイズマスター
            </h1>
            <div id="global-stats" class="text-[10px] mt-1 opacity-90 flex justify-center gap-2">
                <span id="total-progress-text">全185問 収録中</span>
                <span class="bg-white/20 px-2 rounded-full">3年生〜6年生</span>
            </div>
        </header>

        <!-- メイン表示エリア -->
        <main id="main-view" class="flex-grow overflow-y-auto p-4 sm:p-6 custom-scroll">
            
            <!-- 【画面1】学年選択 -->
            <section id="view-home" class="animate-in space-y-6">
                <div class="text-center py-4">
                    <div class="inline-block bg-yellow-100 text-yellow-700 text-xs px-3 py-1 rounded-full font-bold mb-2">COMPLETE EDITION</div>
                    <h2 class="text-xl font-bold text-gray-700">〜 <ruby>何年生<rt>なんねんせい</rt></ruby>の<ruby>問題<rt>もんだい</rt></ruby>にする？ 〜</h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="router.go('grade', {g:3})" class="btn-push bg-yellow-400 hover:bg-yellow-300 text-white py-10 rounded-3xl text-2xl font-bold flex flex-col items-center">
                        <span class="text-sm opacity-80 mb-1">Grade 3</span>
                        3<ruby>年生<rt>ねんせい</rt></ruby>
                    </button>
                    <button onclick="router.go('grade', {g:4})" class="btn-push bg-orange-400 hover:bg-orange-300 text-white py-10 rounded-3xl text-2xl font-bold flex flex-col items-center">
                        <span class="text-sm opacity-80 mb-1">Grade 4</span>
                        4<ruby>年生<rt>ねんせい</rt></ruby>
                    </button>
                    <button onclick="router.go('grade', {g:5})" class="btn-push bg-blue-400 hover:bg-blue-300 text-white py-10 rounded-3xl text-2xl font-bold flex flex-col items-center">
                        <span class="text-sm opacity-80 mb-1">Grade 5</span>
                        5<ruby>年生<rt>ねんせい</rt></ruby>
                    </button>
                    <button onclick="router.go('grade', {g:6})" class="btn-push bg-purple-400 hover:bg-purple-300 text-white py-10 rounded-3xl text-2xl font-bold flex flex-col items-center">
                        <span class="text-sm opacity-80 mb-1">Grade 6</span>
                        6<ruby>年生<rt>ねんせい</rt></ruby>
                    </button>
                </div>

                <div class="text-center pt-10">
                    <button onclick="dataStore.clearAll()" class="text-xs text-gray-400 hover:text-red-400 transition underline decoration-dotted">
                        ※これまでの成績をリセットする
                    </button>
                </div>
            </section>

            <!-- 【画面2】単元選択 -->
            <section id="view-unit" class="hidden animate-in space-y-4">
                <button onclick="router.go('home')" class="text-green-600 text-sm font-bold mb-2 flex items-center hover:bg-green-100 px-3 py-1 rounded-full w-fit transition">
                    ← ほかの<ruby>学年<rt>がくねん</rt></ruby>をえらぶ
                </button>
                
                <div class="flex items-center justify-between border-b pb-4">
                    <h2 id="grade-label" class="text-2xl font-black text-gray-800"></h2>
                    <div id="grade-progress-badge" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold"></div>
                </div>

                <div id="unit-grid" class="grid grid-cols-1 gap-3 py-2">
                    <!-- JSで動的に挿入 -->
                </div>
            </section>

            <!-- 【画面3】クイズ実行 -->
            <section id="view-quiz" class="hidden animate-in h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <span id="quiz-count" class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-bold">1 / 5</span>
                    <span id="quiz-current-score" class="text-orange-500 font-bold text-lg">0 点</span>
                </div>

                <div class="bg-gray-50 p-5 rounded-2xl mb-6 border-l-8 border-green-400 shadow-sm min-h-[120px] flex items-center">
                    <h3 id="question-text" class="text-lg font-bold text-gray-800 leading-relaxed"></h3>
                </div>

                <div id="options-grid" class="space-y-3 mb-6">
                    <!-- JSで動的に挿入 -->
                </div>
                
                <div id="feedback-box" class="hidden border-t-2 border-dashed border-gray-100 pt-6 mt-4">
                    <div id="feedback-icon" class="text-center font-black text-4xl mb-4"></div>
                    <div class="p-4 bg-yellow-50 rounded-2xl text-sm mb-6 border border-yellow-200 text-gray-700 leading-relaxed">
                        <p class="font-bold text-yellow-800 mb-1">★解説</p>
                        <span id="explanation-text"></span>
                    </div>
                    <button onclick="quizEngine.next()" class="btn-push w-full bg-green-500 text-white py-5 rounded-3xl font-bold text-xl mb-10">つぎへ進む</button>
                </div>
            </section>

            <!-- 【画面4】結果発表 -->
            <section id="view-result" class="hidden animate-in space-y-6">
                <div class="text-center bg-gradient-to-b from-green-50 to-white py-12 rounded-[3rem] border-2 border-green-100 shadow-inner">
                    <div id="result-emoji" class="text-8xl mb-6 scale-110">🎉</div>
                    <h2 class="text-2xl font-black mb-2">結果発表！</h2>
                    <p id="result-score-val" class="text-5xl text-green-600 font-black mb-4"></p>
                    <p id="result-message" class="text-gray-500 font-bold px-6"></p>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="router.go('grade', {g: quizEngine.currentGrade})" class="btn-push w-full bg-orange-400 text-white py-5 rounded-full font-bold text-xl">
                        ほかの単元に挑戦
                    </button>
                    <button onclick="router.go('home')" class="btn-push w-full bg-white border-2 border-gray-200 text-gray-400 py-3 rounded-full font-bold text-sm">
                        学年をえらびなおす
                    </button>
                </div>
            </section>

        </main>
        
        <!-- フッター -->
        <footer class="bg-gray-50 p-3 text-[10px] text-gray-400 text-center shrink-0 border-t">
            &copy; 2024 理科クイズマスター制作委員会
        </footer>
    </div>

            isCompleted(grade, unit) {
                const data = this.load();
                return data[grade] && data[grade].includes(unit);
            },
            clearAll() {
                if(confirm('これまでのクリア記録をすべて消去しますか？')){
                    localStorage.removeItem(this.KEY);
                    router.go('home');
                }
            },
            updateGlobalBadge() {
                const data = this.load();
                let total = 0;
                Object.values(data).forEach(v => total += v.length);
                document.getElementById('total-progress-text').innerText = `現在 ${total} 単元 クリア！`;
            }
        };

        /**
         * クイズエンジン
         */
        const quizEngine = {
            currentGrade: null,
            currentUnit: null,
            questions: [],
            index: 0,
            score: 0,
            isLocked: false,

            init(grade, unit) {
                this.currentGrade = grade;
                this.currentUnit = unit;
                this.questions = this.shuffle([...ALL_QUIZ_DATA[grade][unit]]);
                this.index = 0;
                this.score = 0;
                this.isLocked = false;
                this.render();
            },

            shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            },

            render() {
                const q = this.questions[this.index];
                document.getElementById('quiz-count').innerText = `${this.index + 1} / ${this.questions.length}`;
                document.getElementById('quiz-current-score').innerText = `${this.score} 点`;
                document.getElementById('question-text').innerHTML = q.q;
                
                const grid = document.getElementById('options-grid');
                grid.innerHTML = '';
                
                // 選択肢のシャッフル
                const choices = q.a.map((t, i) => ({ t, isC: i === q.c }));
                this.shuffle(choices);

                choices.forEach(choice => {
                    const b = document.createElement('button');
                    b.className = "opt-btn btn-push w-full p-4 bg-white border-2 border-gray-100 rounded-2xl font-bold text-left hover:border-green-300 transition-colors";
                    b.innerHTML = choice.t;
                    b.onclick = () => this.check(choice.isC, b);
                    grid.appendChild(b);
                });

                document.getElementById('feedback-box').classList.add('hidden');
            },

            check(isCorrect, btn) {
                if (this.isLocked) return;
                this.isLocked = true;

                const q = this.questions[this.index];
                const icon = document.getElementById('feedback-icon');
                const box = document.getElementById('feedback-box');
                
                // すべてのボタンを無効化
                document.querySelectorAll('.opt-btn').forEach(b => {
                    b.disabled = true;
                    b.style.opacity = "0.5";
                });
                
                btn.style.opacity = "1";
                if (isCorrect) {
                    this.score += 20;
                    icon.innerText = "⭕️ せいかい！";
                    icon.className = "text-center font-black text-4xl mb-4 text-green-500 animate-bounce";
                    btn.classList.add('border-green-500', 'bg-green-50');
                } else {
                    icon.innerText = "❌ まちがい...";
                    icon.className = "text-center font-black text-4xl mb-4 text-red-500";
                    btn.classList.add('border-red-500', 'bg-red-50');
                }

                document.getElementById('explanation-text').innerText = q.e;
                box.classList.remove('hidden');
                
                // 自動スクロール
                setTimeout(() => {
                    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            },

            next() {
                this.index++;
                if (this.index < this.questions.length) {
                    this.isLocked = false;
                    this.render();
                } else {
                    router.go('result');
                }
            }
        };

        /**
         * ルーター（画面遷移）
         */
        const router = {
            views: {
                home: document.getElementById('view-home'),
                unit: document.getElementById('view-unit'),
                quiz: document.getElementById('view-quiz'),
                result: document.getElementById('view-result')
            },

            go(viewName, params = {}) {
                // すべて隠す
                Object.values(this.views).forEach(v => v.classList.add('hidden'));
                
                // 対象を表示
                const target = this.views[viewName];
                target.classList.remove('hidden');
                document.getElementById('main-view').scrollTop = 0;

                // 画面ごとの処理
                if (viewName === 'grade') {
                    this.renderUnitSelection(params.g);
                } else if (viewName === 'quiz') {
                    quizEngine.init(params.g, params.u);
                } else if (viewName === 'result') {
                    this.renderResult();
                } else if (viewName === 'home') {
                    dataStore.updateGlobalBadge();
                }
            },

            renderUnitSelection(grade) {
                const target = this.views.unit;
                target.classList.remove('hidden');
                
                document.getElementById('grade-label').innerText = `${grade}年生`;
                const units = Object.keys(ALL_QUIZ_DATA[grade]);
                const completedCount = (dataStore.load()[grade] || []).length;
                document.getElementById('grade-progress-badge').innerText = `達成: ${completedCount} / ${units.length}`;

                const grid = document.getElementById('unit-grid');
                grid.innerHTML = '';

                units.forEach(u => {
                    const done = dataStore.isCompleted(grade, u);
                    const b = document.createElement('button');
                    b.className = `btn-push w-full p-5 border-2 rounded-3xl text-left font-bold flex items-center justify-between transition-all ${done ? 'bg-yellow-50 border-yellow-400 shadow-[0_4px_0_#facc15]' : 'bg-white border-green-100 hover:border-green-400'}`;
                    b.innerHTML = `
                        <span class="flex flex-col">
                            <span class="text-[10px] opacity-50">${done ? 'COMPLETE' : 'UNFINISHED'}</span>
                            <span class="${done ? 'text-yellow-800' : 'text-gray-700'}">${u}</span>
                        </span>
                        ${done ? '<span class="text-2xl">👑</span>' : '<span class="text-xl text-green-200">▶︎</span>'}
                    `;
                    b.onclick = () => this.go('quiz', { g: grade, u: u });
                    grid.appendChild(b);
                });
            },

            renderResult() {
                const score = quizEngine.score;
                const emoji = document.getElementById('result-emoji');
                const scoreVal = document.getElementById('result-score-val');
                const msg = document.getElementById('result-message');

                scoreVal.innerText = `${score} 点`;
                
                if (score === 100) {
                    emoji.innerText = "🏆";
                    msg.innerText = "すごすぎる！全問正解だ！この単元は完ぺきだね。";
                    dataStore.save(quizEngine.currentGrade, quizEngine.currentUnit);
                } else if (score >= 60) {
                    emoji.innerText = "🎉";
                    msg.innerText = "おめでとう！あともう少しで満点だ。次は100点を目指そう！";
                } else {
                    emoji.innerText = "🌱";
                    msg.innerText = "おつかれさま！もう一度復習して、次はもっといい点数をとろう。";
                }
            }
        };

        // 初期化
        window.onload = () => {
            dataStore.updateGlobalBadge();
        };

    </script>
</body>
</html>
