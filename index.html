<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理科クイズ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
            background: #f5f0eb;
            color: #4a4a4a;
            min-height: 100vh;
        }
        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #faf8f5;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 18px 20px 14px;
            text-align: center;
            background: #faf8f5;
            border-bottom: 1px solid #ede8e1;
            z-index: 5;
        }
        header h1 { font-size: 17px; font-weight: 700; color: #5a5a5a; }
        #total-progress-text { font-size: 11px; color: #a8a09a; margin-top: 5px; display: block; }

        main { flex: 1; position: relative; overflow: hidden; }

        /* 各ビューの共通スタイル */
        .view-screen {
            position: absolute;
            inset: 0;
            padding: 20px 16px;
            background: #faf8f5;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: none;
            z-index: 10;
        }
        .view-screen.active { display: block; }
        .view-screen::-webkit-scrollbar { display: none; }

        /* HOME */
        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .chart-card p { font-size: 11px; color: #b0a8a0; text-align: center; margin-bottom: 10px; }
        .chart-wrap { height: 180px; position: relative; }
